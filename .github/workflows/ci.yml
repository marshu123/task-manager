name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Check FastAPI backend
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg://taskuser:taskpassword@localhost:5432/taskmanager

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: taskmanager
          POSTGRES_USER: taskuser
          POSTGRES_PASSWORD: taskpassword
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U taskuser -d taskmanager"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check API imports
        run: python -c "from main import app; print(app.title)"

  frontend:
    name: Build React frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t task-manager .